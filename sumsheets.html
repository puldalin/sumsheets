<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sumsheets — Templates ระบบร้านค้า สำหรับคนไทย</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai+Looped:wght@300;400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* CSS เหมือนตัวเดิมของคุณแต่มีการเก็บรายละเอียดเพิ่มเล็กน้อย */
:root {
  --white: #FFFFFF;
  --off-white: #FAFAFA;
  --soft-bg: #F5F5F5;
  --black: #0A0A0A;
  --dark: #111111;
  --dark-card: #161616;
  --green: #00E676;
  --green-bright: #00FF88;
  --green-soft: #E0FFF0;
  --green-mid: #00C66E;
  --green-glow: rgba(0, 255, 136, 0.4);
  --text: #1A1A1A;
  --text-soft: #4B5563;
  --text-mute: #9CA3AF;
  --border: #E5E7EB;
  --border-strong: #D1D5DB;
  --red: #EF4444;
  --gold: #F59E0B;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
  --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
  --shadow-lg: 0 16px 48px rgba(0,0,0,0.12);
  --radius: 16px;
  --radius-sm: 10px;
  --radius-lg: 24px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body {
  background: var(--white);
  color: var(--text);
  font-family: 'IBM Plex Sans Thai Looped', 'Sarabun', sans-serif;
  font-size: 16px;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; border: none; background: none; font-family: inherit; }
img { max-width: 100%; display: block; }
input, textarea, select { font-family: inherit; font-size: inherit; }

.container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 20px; }

/* ============ NAV ============ */
.nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.nav-inner {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; max-width: 1200px; margin: 0 auto;
}
.logo {
  font-weight: 700; font-size: 24px;
  display: flex; align-items: center; gap: 8px;
  letter-spacing: -0.02em;
  cursor: pointer;
}
.logo-mark {
  width: 36px; height: 36px;
  background: var(--black);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  color: var(--green-bright);
  font-weight: 700;
  font-size: 18px;
  box-shadow: 0 0 20px var(--green-glow);
}
.nav-links { display: flex; gap: 8px; align-items: center; }
.nav-link {
  padding: 8px 14px;
  font-size: 14px;
  color: var(--text-soft);
  font-weight: 500;
  border-radius: 8px;
  transition: all 0.2s;
}
.nav-link:hover { color: var(--green-mid); background: var(--green-soft); }
.nav-cta {
  background: var(--black);
  color: var(--white);
  padding: 10px 18px;
  border-radius: 999px;
  font-weight: 600;
  font-size: 14px;
  transition: all 0.2s;
}
.nav-cta:hover {
  background: var(--green-mid);
  box-shadow: 0 0 16px var(--green-glow);
}

/* ============ HERO ============ */
.hero {
  padding: 60px 0 80px;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -100px; right: -100px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(0,230,118,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.hero-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 48px;
  align-items: center;
  position: relative;
  z-index: 1;
}
@media (min-width: 900px) {
  .hero-grid { grid-template-columns: 1.1fr 1fr; gap: 60px; }
}
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--green-soft);
  border: 1px solid rgba(0,230,118,0.3);
  padding: 8px 16px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  color: var(--green-mid);
  margin-bottom: 24px;
}
.hero-badge .dot {
  width: 8px; height: 8px;
  background: var(--green);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--green);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(0.85); }
}
.hero h1 {
  font-size: clamp(34px, 6vw, 56px);
  font-weight: 700;
  line-height: 1.15;
  margin-bottom: 20px;
  letter-spacing: -0.02em;
}
.hero h1 .green-text {
  color: var(--green-mid);
  position: relative;
}
.hero h1 .green-text::after {
  content: '';
  position: absolute;
  bottom: 4px; left: 0; right: 0;
  height: 12px;
  background: var(--green-soft);
  z-index: -1;
  border-radius: 4px;
}
.hero p {
  font-size: 17px;
  color: var(--text-soft);
  margin-bottom: 32px;
  max-width: 540px;
  line-height: 1.7;
}
.hero-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 36px;
}
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 16px 28px;
  border-radius: 12px;
  font-weight: 600;
  font-size: 15px;
  transition: all 0.25s;
  white-space: nowrap;
  min-height: 54px;
  cursor: pointer;
}
.btn-primary {
  background: var(--black);
  color: var(--white);
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.btn-primary:hover {
  background: var(--green-mid);
  box-shadow: 0 0 24px var(--green-glow);
  transform: translateY(-2px);
}
.btn-secondary {
  background: var(--white);
  color: var(--text);
  border: 2px solid var(--border-strong);
}
.btn-secondary:hover {
  border-color: var(--green-mid);
  color: var(--green-mid);
  transform: translateY(-2px);
}
.btn-green {
  background: var(--green-mid);
  color: var(--white);
  box-shadow: 0 4px 16px var(--green-glow);
}
.btn-green:hover {
  background: var(--black);
  transform: translateY(-2px);
}
.btn-arrow { transition: transform 0.2s; }
.btn:hover .btn-arrow { transform: translateX(4px); }
.btn-block { width: 100%; }

/* ============ SECTIONS ============ */
.section {
  padding: 80px 0;
}
.section-head {
  text-align: center;
  max-width: 720px;
  margin: 0 auto 48px;
}
.section-tag {
  display: inline-block;
  background: var(--black);
  color: var(--green-bright);
  padding: 6px 14px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-bottom: 16px;
}
.section h2 {
  font-size: clamp(28px, 4.5vw, 42px);
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 14px;
  letter-spacing: -0.02em;
}
.section h2 .green {
  color: var(--green-mid);
}

/* ============ PRODUCT GRID ============ */
.products {
  background: var(--off-white);
  position: relative;
}
.product-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
}
@media (min-width: 600px) { .product-grid { grid-template-columns: repeat(2, 1fr); } }
@media (min-width: 960px) { .product-grid { grid-template-columns: repeat(3, 1fr); } }

.product-card {
  background: var(--dark);
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--dark-card);
  cursor: pointer;
  position: relative;
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  color: var(--white);
}
.product-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 50px rgba(0,255,136,0.25), 0 0 0 1px var(--green);
}
.product-image {
  aspect-ratio: 16/10;
  background: linear-gradient(135deg, #0F1F18 0%, #061410 100%);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.product-emoji {
  font-size: 64px;
  position: relative;
  z-index: 1;
}
.product-badge {
  position: absolute;
  top: 12px; left: 12px;
  background: var(--green-bright);
  color: var(--black);
  padding: 5px 12px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
  z-index: 2;
}
.product-body { padding: 22px; }
.product-cat { font-size: 11px; color: var(--green-bright); font-weight: 600; margin-bottom: 8px; }
.product-title { font-size: 19px; font-weight: 700; margin-bottom: 8px; color: var(--white); }
.product-desc { font-size: 14px; color: #9CA3AF; margin-bottom: 14px; line-height: 1.6; }
.product-rating { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #9CA3AF; margin-bottom: 14px; }
.stars { color: var(--gold); }
.product-foot { display: flex; align-items: center; justify-content: space-between; padding-top: 14px; border-top: 1px solid #1F1F1F; }
.price-old { font-size: 12px; color: var(--text-mute); text-decoration: line-through; display: block; }
.price-now { font-size: 22px; font-weight: 700; color: var(--green-bright); }
.product-buy { background: var(--green-bright); color: var(--black); padding: 8px 14px; border-radius: 8px; font-weight: 700; font-size: 13px; }

/* ============ MODAL & CHECKOUT ============ */
.modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  backdrop-filter: blur(6px); z-index: 1000;
  display: none; align-items: flex-start; justify-content: center;
  padding: 20px; overflow-y: auto;
}
.modal-bg.show { display: flex; }
.modal {
  background: var(--white); border-radius: var(--radius-lg);
  max-width: 720px; width: 100%; margin: 20px auto;
  overflow: hidden; box-shadow: var(--shadow-lg);
  position: relative; animation: slideUp 0.3s ease;
}
@keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

.modal-close {
  position: absolute; top: 16px; right: 16px;
  width: 36px; height: 36px; background: var(--soft-bg);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  z-index: 10;
}

.checkout-step { padding: 32px; }
.checkout-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.checkout-sub { color: var(--text-soft); margin-bottom: 24px; font-size: 14px; }

.form-group { margin-bottom: 18px; }
.form-label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; }
.form-input { width: 100%; padding: 14px 16px; border: 2px solid var(--border); border-radius: 10px; }
.form-input:focus { border-color: var(--green-mid); outline: none; }

.bank-info {
  background: var(--dark); color: var(--white);
  border-radius: 16px; padding: 28px; text-align: center;
  margin-bottom: 24px;
}
.bank-account-num { font-size: 28px; font-weight: 700; color: var(--green-bright); margin: 10px 0; letter-spacing: 1px; }

.upload-zone {
  border: 2px dashed var(--border-strong); border-radius: 12px;
  padding: 32px 20px; text-align: center; cursor: pointer;
  background: var(--soft-bg); transition: 0.2s;
}
.upload-zone:hover { border-color: var(--green-mid); background: var(--green-soft); }
.upload-preview { max-height: 200px; border-radius: 8px; margin-top: 15px; }

.alert { padding: 14px; border-radius: 10px; font-size: 14px; margin: 15px 0; display: flex; gap: 10px; }
.alert-info { background: #EFF6FF; color: #1E40AF; }
.alert-warn { background: #FEF3C7; color: #92400E; }

/* Success Screen */
.success-icon {
  width: 80px; height: 80px; background: var(--green-soft); color: var(--green-mid);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 40px; margin: 0 auto 20px;
}

/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--black); color: var(--white); padding: 12px 24px;
  border-radius: 999px; z-index: 2000; display: none;
}
.toast.show { display: block; animation: fadeInUp 0.3s; }
@keyframes fadeInUp { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }

.hidden { display: none !important; }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="logo" onclick="location.reload()">
      <span class="logo-mark">s</span>
      <span>sumsheets</span>
    </div>
    <div class="nav-links">
      <a class="nav-link" href="#templates-section">Templates</a>
      <button class="nav-cta" onclick="scrollTo('templates-section')">เริ่มใช้งาน</button>
    </div>
  </div>
</nav>

<section class="hero">
  <div class="container">
    <div class="hero-grid">
      <div>
        <div class="hero-badge">
          <span class="dot"></span>
          <span>ใช้งานแล้วกว่า 2,500 ร้านค้า</span>
        </div>
        <h1>ระบบร้านค้า <span class="green-text">ใช้งานง่าย</span> ในไฟล์เดียว</h1>
        <p>Templates Google Sheets สำหรับร้านค้าทุกขนาด — ระบบ POS, สต็อก, บัญชี พร้อมใช้ทันที ไม่ต้องเขียนสูตร</p>
        <div class="hero-actions">
          <button class="btn btn-primary" onclick="scrollTo('templates-section')">เลือก Template →</button>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="section products" id="templates-section">
  <div class="container">
    <div class="section-head">
      <span class="section-tag">Templates พร้อมใช้</span>
      <h2>เลือก Template <span class="green">ที่ใช่สำหรับคุณ</span></h2>
    </div>
    <div class="product-grid" id="productGrid"></div>
  </div>
</section>

<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// DATA
const PRODUCTS = [
  { id: 1, emoji: '🏪', cat: 'ระบบร้านค้า', title: 'ระบบจัดการร้านค้า Pro', price: 890, oldPrice: 1490, rating: 4.9, reviewCount: 847, desc: 'POS + สต็อก + บัญชี ครบในไฟล์เดียว' },
  { id: 2, emoji: '🛒', cat: 'POS', title: 'ระบบ POS + สต็อกหน้าร้าน', price: 1290, oldPrice: 1990, rating: 4.9, reviewCount: 312, desc: 'ตัดสต็อกอัตโนมัติทุกบิล พร้อม Dashboard' },
  { id: 3, emoji: '📄', cat: 'เอกสาร', title: 'Invoice & ใบเสร็จ Pro', price: 690, oldPrice: 990, rating: 4.8, reviewCount: 412, desc: 'ออกเอกสารธุรกิจสวยงามใน 30 วินาที' }
];

const BANK = { name: 'ปานดา มูลทา', number: '098-7-903895', bank: 'ธนาคารกรุงเทพ' };

// HELPER
const $ = s => document.querySelector(s);
const fmt = n => n.toLocaleString('th-TH');

function toast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function scrollTo(id) {
  document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
}

// RENDER PRODUCTS
function renderProducts() {
  $('#productGrid').innerHTML = PRODUCTS.map(p => `
    <div class="product-card" onclick="startCheckout(${p.id})">
      <div class="product-image"><span class="product-emoji">${p.emoji}</span></div>
      <div class="product-body">
        <div class="product-cat">${p.cat}</div>
        <h3 class="product-title">${p.title}</h3>
        <p class="product-desc">${p.desc}</p>
        <div class="product-foot">
          <div>
            <span class="price-old">฿${fmt(p.oldPrice)}</span>
            <span class="price-now">฿${fmt(p.price)}</span>
          </div>
          <button class="product-buy">ซื้อเลย</button>
        </div>
      </div>
    </div>
  `).join('');
}

// CHECKOUT FLOW
let currentOrder = {};

function startCheckout(id) {
  const p = PRODUCTS.find(x => x.id === id);
  currentOrder = { product: p, orderId: 'ORD-' + Math.random().toString(36).substr(2, 9).toUpperCase() };
  showEmailStep();
}

function showEmailStep() {
  openModal(`
    <div class="checkout-step">
      <button class="modal-close" onclick="closeModal()">×</button>
      <h2 class="checkout-title">📧 รับไฟล์ผ่านอีเมล</h2>
      <p class="checkout-sub">ระบบจะส่ง Template ไปยังอีเมลนี้ทันทีหลังแจ้งโอน</p>
      <div class="form-group">
        <label class="form-label">อีเมลของคุณ</label>
        <input type="email" class="form-input" id="emailInput" placeholder="example@email.com">
      </div>
      <button class="btn btn-primary btn-block" onclick="goToPayment()">ดำเนินการต่อ →</button>
    </div>
  `);
}

function goToPayment() {
  const email = $('#emailInput').value;
  if (!email.includes('@')) return toast('กรุณากรอกอีเมลที่ถูกต้อง');
  currentOrder.email = email;
  showPaymentStep();
}

function showPaymentStep() {
  openModal(`
    <div class="checkout-step">
      <button class="modal-close" onclick="closeModal()">×</button>
      <h2 class="checkout-title">💳 ชำระเงิน</h2>
      <div class="bank-info">
        <p>${BANK.bank}</p>
        <div class="bank-account-num" id="accNum">${BANK.number}</div>
        <p>${BANK.name}</p>
        <h2 style="color:var(--green-bright); margin-top:10px;">ยอดโอน: ฿${fmt(currentOrder.product.price)}</h2>
      </div>
      <div class="alert alert-info">กรุณาโอนเงินตามยอด และอัปโหลดสลิปด้านล่าง</div>
      <div class="upload-zone" onclick="$('#fileInput').click()">
        <p id="uploadText">📷 คลิกเพื่ออัปโหลดสลิป</p>
        <img id="preview" class="upload-preview hidden">
      </div>
      <input type="file" id="fileInput" class="hidden" onchange="handleFile(this)">
      <button class="btn btn-green btn-block" style="margin-top:20px" onclick="verifySlip()">ยืนยันการโอน →</button>
    </div>
  `);
}

function handleFile(input) {
  const file = input.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      $('#preview').src = e.target.result;
      $('#preview').classList.remove('hidden');
      $('#uploadText').classList.add('hidden');
      currentOrder.slip = e.target.result;
    };
    reader.readAsDataURL(file);
  }
}

function verifySlip() {
  if (!currentOrder.slip) return toast('กรุณาอัปโหลดสลิป');
  
  // Simulate AI Verification
  toast('正在ตรวจสอบสลิป...');
  setTimeout(() => {
    showSuccess();
  }, 2000);
}

function showSuccess() {
  openModal(`
    <div class="checkout-step" style="text-align:center">
      <div class="success-icon">✓</div>
      <h2 class="checkout-title">สั่งซื้อสำเร็จ!</h2>
      <p class="checkout-sub">เราได้ส่งไฟล์ไปยัง <b>${currentOrder.email}</b> เรียบร้อยแล้ว</p>
      <div class="alert alert-warn">หากไม่พบในหน้าหลัก กรุณาเช็คใน Junk Mail / Spam</div>
      <button class="btn btn-primary btn-block" onclick="closeModal()">กลับหน้าหลัก</button>
    </div>
  `);
}

function openModal(html) {
  $('#modalContent').innerHTML = html;
  $('#modal').classList.add('show');
}

function closeModal() {
  $('#modal').classList.remove('show');
}

renderProducts();
</script>
</body>
</html>
